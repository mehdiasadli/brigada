# Lefthook configuration
# https://lefthook.dev

pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc}"
      run: bun biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true

commit-msg:
  jobs:
    - name: commitlint
      run: bun commitlint --edit {1}

pre-push:
  jobs:
    - name: check-types
      run: bun turbo check-types
