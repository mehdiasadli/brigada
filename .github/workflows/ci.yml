name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  TURBO_TELEMETRY_DISABLED: 1
  # @brigada/db's `postinstall` runs `prisma generate`, which loads
  # prisma.config.ts. That config calls env("DATABASE_URL") eagerly and
  # throws if unset. We use a dummy URL on CI because generate only parses
  # the schema; it doesn't open a connection.
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci

jobs:
  biome:
    name: Biome
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json
      - run: bun install --frozen-lockfile
      - run: bun biome ci .

  check-types:
    name: Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json
      - run: bun install --frozen-lockfile
      - run: bun run check-types

  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      # t3-env escape hatch — schema is still the single source of truth,
      # we just don't validate at build time on CI.
      SKIP_ENV_VALIDATION: "1"
      # Next inlines NEXT_PUBLIC_* into the bundle at build time, so it
      # needs an actual value even when validation is skipped.
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json
      - run: bun install --frozen-lockfile
      - run: bun run build

  pr-title:
    name: PR title (commitlint)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json
      - run: bun install --frozen-lockfile
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: echo "$PR_TITLE" | bun commitlint
